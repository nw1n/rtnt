<elder-single-pane-wrapper>
  <elder-table [data]="data" class="flex" matSort (itemClick)="openDetail($event)">
    <elder-data-toolbar
      *elderTableToolbar
      (requestNew)="createNew($event)"
      [canAdd]="false"
      [canRemove]="false"
      [canMore]="false"
    >
      <elder-search-box
        *elderToolbarContent="'center'"
        [autoPanel]="true"
        [elderSearchContext]="data?.filter"
        class="flex-60"
        queryKey="query"
      >
      </elder-search-box>
      <button *elderToolbarContent="'right'" mat-icon-button (click)="refresh()">
        <mat-icon>refresh</mat-icon>
      </button>
    </elder-data-toolbar>

    <!-- icon Column -->
    <ng-container matColumnDef="icon">
      <th mat-header-cell *matHeaderCellDef style="width: 5%">Icon</th>
      <td mat-cell *matCellDef="let ship">
        <mat-icon [style.color]="ship.playerHexColor || null">
          {{ ship.playerId ? 'sailing' : '' }}
        </mat-icon>
      </td>
    </ng-container>

    <!-- id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef style="width: 20%" mat-sort-header>Id</th>
      <td mat-cell *matCellDef="let ship" class="text-label-small">{{ ship.id }}</td>
    </ng-container>

    <!-- name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef style="width: 20%" mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let ship" class="text-label-normal">{{ ship.name }}</td>
    </ng-container>

    <!-- gold Column -->
    <ng-container matColumnDef="gold">
      <th mat-header-cell *matHeaderCellDef style="width: 10%" mat-sort-header="inventory.gold">
        Gold
      </th>
      <td mat-cell *matCellDef="let ship" class="inventory-number">
        {{ ship.inventory?.gold ?? 0 }}
      </td>
    </ng-container>

    <!-- current island Column -->
    <ng-container matColumnDef="anchoredAt">
      <th mat-header-cell *matHeaderCellDef style="width: 20%" mat-sort-header="islandId">
        Current Island
      </th>
      <td mat-cell *matCellDef="let ship" class="text-body-small">
        {{ ship.islandId || 'At Sea' }}
      </td>
    </ng-container>

    <!-- controlled by Column -->
    <ng-container matColumnDef="controlledBy">
      <th mat-header-cell *matHeaderCellDef style="width: 20%" mat-sort-header="playerId">
        Controlled By
      </th>
      <td mat-cell *matCellDef="let ship" class="text-body-small">
        {{ ship.playerId || 'Unassigned' }}
      </td>
    </ng-container>
  </elder-table>
</elder-single-pane-wrapper>
