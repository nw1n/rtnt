<elder-single-pane-wrapper>
  <elder-table [data]="data" class="flex" matSort>
    <elder-data-toolbar
      *elderTableToolbar
      (requestNew)="createNew($event)"
      [canAdd]="false"
      [canRemove]="false"
      [canMore]="false"
    >
      <elder-search-box
        *elderToolbarContent="'center'"
        [autoPanel]="true"
        [elderSearchContext]="data?.filter"
        class="flex-60"
        queryKey="query"
      >
      </elder-search-box>
      <button *elderToolbarContent="'right'" mat-icon-button (click)="refresh()">
        <mat-icon>refresh</mat-icon>
      </button>
    </elder-data-toolbar>

    <!-- icon Column -->
    <ng-container matColumnDef="icon">
      <th mat-header-cell *matHeaderCellDef style="width: 5%"></th>
      <td mat-cell *matCellDef="let island">
        <mat-icon color="primary">landscape</mat-icon>
      </td>
    </ng-container>

    <!-- id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef style="width: 15%" mat-sort-header>Id</th>
      <td mat-cell *matCellDef="let island" class="text-label-small">{{ island.id }}</td>
    </ng-container>

    <!-- name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef style="width: 20%" mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let island" class="text-label-normal">{{ island.name }}</td>
    </ng-container>

    <!-- position Column -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef style="width: 15%">Position</th>
      <td mat-cell *matCellDef="let island" class="text-body-small">
        ({{ island.footprint.x }}, {{ island.footprint.y }})
      </td>
    </ng-container>

    <!-- size Column -->
    <ng-container matColumnDef="size">
      <th mat-header-cell *matHeaderCellDef style="width: 15%">Size</th>
      <td mat-cell *matCellDef="let island" class="text-body-small">
        {{ island.footprint.width }} x {{ island.footprint.length }}
      </td>
    </ng-container>

    <!-- interaction Column -->
    <ng-container matColumnDef="interaction">
      <th mat-header-cell *matHeaderCellDef style="width: 10%">Action</th>
      <td mat-cell *matCellDef="let island">
        <button
          mat-icon-button
          type="button"
          aria-label="Open island interaction"
          (click)="openInteractionDialog(island)"
        >
          <mat-icon>directions_boat</mat-icon>
        </button>
      </td>
    </ng-container>
  </elder-table>
</elder-single-pane-wrapper>
