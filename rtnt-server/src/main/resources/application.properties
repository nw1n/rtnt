spring.application.name=rtnt

server.port=18080

# RTNT game/use-case logs (NPC trades, price tweaks, booms, etc.) at DEBUG; framework stays at default INFO
logging.level.com.example.rtnt=DEBUG

# Initial world size (CommandLineRunner: islands @Order(1), ships @Order(2); defaults match code if omitted)
rtnt.startup.island-count=40
rtnt.startup.ship-count=60

# MongoDB Configuration
# Uses IntelliJ env var MONGODB_URI when set.
# Falls back to local Docker MongoDB when MONGODB_URI is missing.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27018/rtnt}
spring.data.mongodb.auto-index-creation=true

# Logging defaults tuned for lower log ingestion costs in Azure.
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.example.rtnt=${LOG_LEVEL_APP:WARN}
logging.level.org.mongodb.driver=${LOG_LEVEL_MONGODB_DRIVER:WARN}
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN

