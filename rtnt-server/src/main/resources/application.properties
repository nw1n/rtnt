spring.application.name=rtnt
server.port=18080
# Initial world size (CommandLineRunner: islands @Order(1), ships @Order(2); defaults match code if omitted)
rtnt.startup.island-count=40
rtnt.startup.ship-count=60
# MongoDB Configuration
# Uses IntelliJ env var MONGODB_URI when set.
# Falls back to local Docker MongoDB when MONGODB_URI is missing.
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27018/rtnt}
spring.data.mongodb.auto-index-creation=true
# Logging defaults tuned for lower log ingestion costs in Azure.
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.example.rtnt=${LOG_LEVEL_APP:WARN}
logging.level.org.mongodb.driver=${LOG_LEVEL_MONGODB_DRIVER:WARN}
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
# Kafka producer
rtnt.kafka.bootstrap-servers=${RTNT_KAFKA_BOOTSTRAP_SERVERS:}
rtnt.kafka.security-protocol=${RTNT_KAFKA_SECURITY_PROTOCOL:SASL_SSL}
rtnt.kafka.sasl-mechanism=${RTNT_KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
rtnt.kafka.sasl-username=${RTNT_KAFKA_SASL_USERNAME:}
rtnt.kafka.sasl-password=${RTNT_KAFKA_SASL_PASSWORD:}
rtnt.kafka.ssl-endpoint-identification-algorithm=${RTNT_KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:}
rtnt.kafka.ssl-truststore-type=${RTNT_KAFKA_SSL_TRUSTSTORE_TYPE:PKCS12}
rtnt.kafka.ssl-truststore-location=${RTNT_KAFKA_SSL_TRUSTSTORE_LOCATION:client.truststore.jks}
rtnt.kafka.ssl-truststore-password=${RTNT_KAFKA_SSL_TRUSTSTORE_PASSWORD:}
